schema_version: "1.0"

extension:
  id: "csc"
  name: "Spec Kit CSC Skills"
  version: "0.2.0"
  description: "Seven spec-kit-native skills — grill, architecture review, TDD, prototyping, teaching, caveman mode, and handoff — all routing their writebacks into spec-kit artifacts instead of CONTEXT.md/ADRs"
  author: "schwarz-christoph"
  repository: "https://github.com/schwarz-christoph/spec-kit-csc-extension"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"
  tools:
    - name: "git"
      required: false

provides:
  commands:
    - name: "speckit-grill"
      file: "commands/speckit-grill.md"
      description: "Stress-test the active spec/plan against the constitution and spec-kit artifacts; write resolved decisions back inline as they crystallise"
    - name: "speckit-architecture"
      file: "commands/speckit-architecture.md"
      description: "Codebase-wide review for deepening opportunities, informed by the constitution and Key Entities across specs; candidates rendered as a visual HTML report"
    - name: "speckit-tdd"
      file: "commands/speckit-tdd.md"
      description: "Red-green-refactor TDD driven by the active feature's Acceptance Scenarios and FR-###; completed cycles tick the matching tasks in tasks.md"
    - name: "speckit-prototype"
      file: "commands/speckit-prototype.md"
      description: "Throwaway prototype (terminal app for logic, multi-variant route for UI) answering an open question; the answer resolves [NEEDS CLARIFICATION] and lands in research.md/data-model.md"
    - name: "speckit-teach"
      file: "commands/speckit-teach.md"
      description: "Stateful multi-session teaching workspace (mission, resources, lessons, learning records, glossary), spec-kit-aware when teaching the project's own domain"
    - name: "speckit-caveman"
      file: "commands/speckit-caveman.md"
      description: "Ultra-compressed communication mode (~75% fewer tokens) that keeps technical accuracy and spec-kit identifiers exact"
    - name: "speckit-handoff"
      file: "commands/speckit-handoff.md"
      description: "Compact the conversation into a handoff document anchored to the active feature, referencing spec-kit artifacts by path instead of duplicating them"

tags:
  - "clarification"
  - "review"
  - "constitution"
  - "adversarial"
  - "ubiquitous-language"
  - "architecture"
  - "tdd"
  - "prototyping"
  - "teaching"
  - "handoff"
